spring:
  application:
    name: "gacapp"
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

jwt:
  secret: ${SECRET_KEY}
  expiration: 86400000 # 1 day in ms



logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.example.gacapp: DEBUG